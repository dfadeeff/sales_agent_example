<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marble — Vinyl Store</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Auth overlay -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h1>Marble</h1>
    <p>Your digital vinyl store</p>

    <!-- Login form -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password">
      </div>
      <div class="error-msg" id="loginError"></div>
      <button class="btn-primary btn-full" id="loginBtn" onclick="doLogin()">Sign in</button>
      <div class="auth-toggle">No account? <a onclick="showRegister()">Register</a></div>
    </div>

    <!-- Register form -->
    <div id="registerForm" style="display:none">
      <div class="form-row">
        <div class="form-group">
          <label>First name *</label>
          <input type="text" id="regFirst" placeholder="Jane">
        </div>
        <div class="form-group">
          <label>Last name *</label>
          <input type="text" id="regLast" placeholder="Doe">
        </div>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="regEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="regPassword" placeholder="Min 6 characters">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <input type="text" id="regCity" placeholder="Berlin">
        </div>
        <div class="form-group">
          <label>Country</label>
          <input type="text" id="regCountry" placeholder="Germany">
        </div>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="regPhone" placeholder="+49 30 ...">
      </div>
      <div class="error-msg" id="registerError"></div>
      <button class="btn-primary btn-full" id="registerBtn" onclick="doRegister()">Create account</button>
      <div class="auth-toggle">Have an account? <a onclick="showLogin()">Sign in</a></div>
    </div>
  </div>
</div>

<!-- Chat interface -->
<div class="chat-layout" id="chatLayout" style="display:none">
  <div class="chat-header">
    <h1>Marble Vinyl Store</h1>
    <div style="display:flex;align-items:center;gap:0.75rem">
      <span class="user-info" id="userLabel"></span>
      <button class="btn-secondary" onclick="doLogout()" style="font-size:0.78rem;padding:0.3rem 0.7rem">Sign out</button>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message assistant">
      Hi! I'm your Marble vinyl store assistant. Ask me about artists, albums, or tracks — or tell me what you'd like to buy.
    </div>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="chat-input-row">
    <textarea id="chatInput" placeholder="Ask about music or browse the catalog…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="btn-primary" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="/static/chat.js"></script>
</body>
</html>
